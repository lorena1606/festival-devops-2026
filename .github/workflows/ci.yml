name: CI Festival

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Validar estructura real del proyecto
      run: |
        echo "Verificando archivos críticos en sus carpetas correspondientes..."
        
        # 1. Validar README.md (Este sí está en la raíz)
        if [ -f "README.md" ]; then
          echo "✅ README.md encontrado en la raíz."
        else
          echo "❌ ERROR: Falta README.md" && exit 1
        fi
        
        # 2. Validar index.html dentro de la carpeta frontend
        if [ -f "frontend/index.html" ]; then
          echo "✅ frontend/index.html encontrado."
        else
          echo "❌ ERROR: Falta index.html en la carpeta frontend" && exit 1
        fi

        # 3. Validar style.css dentro de la carpeta frontend
        if [ -f "frontend/style.css" ]; then
          echo "✅ frontend/style.css encontrado."
        else
          echo "❌ ERROR: Falta style.css en la carpeta frontend" && exit 1
        fi

        # 4. Validar backend
        if [ -f "backend/app.py" ]; then
          echo "✅ backend/app.py encontrado."
        else
          echo "⚠️ Advertencia: No se encontró app.py en backend."
        fi