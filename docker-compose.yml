version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: festival_frontend
    ports:
      - "8080:80"
    networks:
      - pacific_network
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: festival_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=devops_pass_2026
      - DB_NAME=pacific_fest
    networks:
      - pacific_network
    depends_on:
      - database

  database:
    image: mysql:5.7
    container_name: festival_database
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=devops_pass_2026
      - MYSQL_DATABASE=pacific_fest
    volumes:
      - pacific_db_data:/var/lib/mysql
    networks:
      - pacific_network

volumes:
  pacific_db_data:
    name: pacific_db_data

networks:
  pacific_network:
    name: pacific_network